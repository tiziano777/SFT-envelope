services:
  neo4j:
    image: neo4j:latest
    container_name: lineage-neo4j
    environment:
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_trigger_enabled: "true"
      NEO4J_AUTH: "neo4j/password"
      NEO4J_server_memory_heap_max__size: "2G" 
      NEO4J_server_config_strict__validation_enabled: "false"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j-data:/var/lib/neo4j/data
      - neo4j-logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s
    networks:
      - lineage-network

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: lineage-phoenix
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_PORT: "6006"
      PHOENIX_HOST: "0.0.0.0"
      PHOENIX_ENABLE_OTLP: "true"
      PHOENIX_ENABLE_PROMETHEUS: "false"
    #healthcheck:
    #  test: ["CMD", "wget", "--spider", "-q", "http://localhost:6006/healthz"]
    #  interval: 15s
    #  timeout: 10s
    #  retries: 5
    #  start_period: 20s
    networks:
      - lineage-network

  master-api:
    build:
      context: .
      dockerfile: Dockerfile.master
    container_name: lineage-master-api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"
      NEO4J_POOL_SIZE: "20"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://phoenix:4317"
      OTEL_SERVICE_NAME: "master-api"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app"
    depends_on:
      neo4j:
        condition: service_healthy
      #phoenix:
      #  condition: service_healthy
    healthcheck:
      #test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s
    networks:
      - lineage-network
    volumes:
      - ./master:/app/master
      - ./tests:/app/tests

  streamlit:
    build:
      context: .
      dockerfile: streamlit_ui/Dockerfile
    container_name: lineage-streamlit
    ports:
      - "8501:8501"
    environment:
      MASTER_API_URL: "http://master-api:8000"
      NEO4J_URI: "neo4j://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password"
      MASTER_API_TOKEN: ""
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app"
    depends_on:
      neo4j:
        condition: service_healthy
      master-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lineage-network
    volumes:
      - ./streamlit_ui:/app/streamlit_ui

volumes:
  neo4j-data:
  neo4j-logs:

networks:
  lineage-network:
    driver: bridge