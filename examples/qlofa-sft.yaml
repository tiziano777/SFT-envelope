experiment:
  name: qlofa-sft-example
  description: QLoRA + SFT with hyperparameter override testing
  seed: 42

model:
  name_or_path: meta-llama/Llama-2-7b
  max_seq_length: 512
  trust_remote_code: false

training:
  technique: sft
  stage: null
  peft:
    method: qlora
    r: 8
    lora_alpha: 16
  precision:
    compute_dtype: bf16
    quantization: nf4
  technique_args: {}

dataset:
  path: datasets/example_sft
  format: chat
  train_split: train
  eval_split: validation

reward:
  functions: null
  reward_model: null

reference_model:
  enabled: false

teacher_model:
  enabled: false

hardware:
  gpu_count: 1
  use_distributed: false

optimization:
  flash_attention: v2
  gradient_checkpointing: true
  sequence_packing: false
  deepspeed_stage: null
  fsdp:
    enabled: false

framework:
  backend: trl
  version: ">=1.0.0"

output:
  dir: ./output/qlofa-sft
  logging_steps: 10
  save_strategy: steps
  save_steps: 50
  save_total_limit: 3
