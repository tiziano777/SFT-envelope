experiment:
  name: torchtune-sft-example
  description: TorchTune SFT - tests new template generation
  seed: 42

model:
  name_or_path: meta-llama/Llama-2-7b
  max_seq_length: 2048
  trust_remote_code: false

training:
  technique: sft
  peft:
    method: lora
    r: 16
    lora_alpha: 32
  precision:
    compute_dtype: fp16
    quantization: none
  technique_args: {}

dataset:
  path: datasets/example_chat
  format: chat
  train_split: train
  eval_split: validation

reward:
  functions: null

reference_model:
  enabled: false

teacher_model:
  enabled: false

hardware:
  gpu_count: 1

optimization:
  flash_attention: v2
  gradient_checkpointing: true
  sequence_packing: false

framework:
  backend: torchtune
  version: ">=0.1.0"

output:
  dir: ./output/torchtune-sft
  logging_steps: 20
  save_steps: 100
  save_total_limit: 2
